[versions]
junit = "5.10.0"
guava = "33.5.0-jre"
jackson = "3.1.1"

[libraries]
junit-bom = { group = "org.junit", name = "junit-bom", version.ref = "junit" }
junit-jupiter = { group = "org.junit.jupiter", name = "junit-jupiter" }
junit-platformLauncher = { group = "org.junit.platform", name = "junit-platform-launcher" }
guava = { group = "com.google.guava", name = "guava", version.ref = "guava" }
jackson-core = { group = "tools.jackson.core", name = "jackson-core", version.ref = "jackson" }
jackson-yaml = { group = "tools.jackson.dataformat", name = "jackson-dataformat-yaml", version.ref = "jackson" }
jackson-toml = { group = "tools.jackson.dataformat", name = "jackson-dataformat-toml", version.ref = "jackson" }
jackson-xml = { group = "tools.jackson.dataformat", name = "jackson-dataformat-xml", version.ref = "jackson" }
